set -g prefix C-Space
set -g mouse on

set -sg escape-time 0
set -g status-position top
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set-option -g exit-empty off

set -g default-terminal "tmux-256color"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q:Tc=\E[38;2;255;255;255m'

# fat block cursor in vim mode
set -g cursor-style block
set -g -a terminal-overrides ',xterm*:Tc=\E[38;2;255;255;255m'

bind-key -T copy-mode-vi 'Enter' send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel

# colors - catppuccin mocha palette
set -g @thm_bg        "#1e1e2e"
set -g @thm_crust     "#11111b"
set -g @thm_surface_0 "#313244"
set -g @thm_surface_1 "#45475a"
set -g @thm_text      "#cdd6f4"
set -g @thm_subtext   "#a6adc8"
set -g @thm_green     "#a6e3a1"
set -g @thm_blue      "#89b4fa"
set -g @thm_peach     "#fab387"
set -g @thm_pink      "#f5c2e7"
set -g @thm_red       "#f38ba8"

# rounded pill separators (require a nerd font)
# U+E0B6 / U+E0B4 render as slanted triangles in FiraCode;
# U+E0B7 / U+E0B5 are the "alternate" half-circles that are always round
set -g @pill_left  ""
set -g @pill_right ""

# status bar base
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100
set -g status-style "bg=#{@thm_crust},fg=#{@thm_text}"

# left: session pill (green, or red when prefix is active)
set -g status-left "#[fg=#{?client_prefix,#{@thm_red},#{@thm_green}}]#{@pill_left}#[bg=#{?client_prefix,#{@thm_red},#{@thm_green}},fg=#{@thm_crust}] #[bg=#{@thm_surface_0},fg=#{@thm_text}] #S#[fg=#{@thm_surface_0},bg=#{@thm_crust}]#{@pill_right} "

# right: current directory pill (pink)
set -g status-right "#[fg=#{@thm_pink},bg=#{@thm_crust}]#{@pill_left}#[bg=#{@thm_pink},fg=#{@thm_crust}] #[bg=#{@thm_surface_0},fg=#{@thm_text}] #{b:pane_current_path}#[fg=#{@thm_surface_0},bg=#{@thm_crust}]#{@pill_right}"

# windows: name on surface, number on accent color, all wrapped in a pill
set -g window-status-separator " "
set -g window-status-format "#[fg=#{@thm_surface_0},bg=#{@thm_crust}]#{@pill_left}#[bg=#{@thm_surface_0},fg=#{@thm_text}] #W #[bg=#{@thm_blue},fg=#{@thm_crust}] #I#[fg=#{@thm_blue},bg=#{@thm_crust}]#{@pill_right}"
set -g window-status-current-format "#[fg=#{@thm_surface_0},bg=#{@thm_crust}]#{@pill_left}#[bg=#{@thm_surface_0},fg=#{@thm_text}] #W #[bg=#{@thm_peach},fg=#{@thm_crust}] #I#[fg=#{@thm_peach},bg=#{@thm_crust}]#{@pill_right}"

# reload config
bind r source-file ~/.tmux.conf

bind-key 'X' kill-session

# better split keys
unbind '"'
unbind %

### key sequences ###
bind-key 't' switch-client -T tab-manager
bind-key -T tab-manager n new-window
bind-key -T tab-manager x kill-window

bind-key p switch-client -T pane-manager
bind-key -T pane-manager n split-window -h
bind-key -T pane-manager - split-window -v
bind-key -T pane-manager '\' split-window -h

bind-key s switch-client -T session-manager
bind-key -T session-manager x kill-session
bind-key -T session-manager f choose-session
bind-key -T session-manager d detach
bind-key -T session-manager n run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key u run-shell "tmux-pane-urls"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

set-option -g default-command 'exec fish'

run '~/.tmux/plugins/tpm/tpm'
